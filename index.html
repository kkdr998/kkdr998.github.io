<!DOCTYPE html>
<meta charset="UTF-8">

<link rel="stylesheet" href="i/i.css">
<header>
	<h1><a href="#/home">The stone's story</a></h1>
	<p>
		<p id="hitokoto">
  <a href="#" id="hitokoto_text">获取中...</a>
</p>
<script>
  fetch('https://v1.hitokoto.cn')
    .then(response => response.json())
    .then(data => {
      const hitokoto = document.querySelector('#hitokoto_text')
      hitokoto.href = `https://hitokoto.cn/?uuid=${data.uuid}`
      hitokoto.innerText = data.hitokoto
    })
    .catch(console.error)
</script>
	</p>
</header>
<head>
	<script>
    window.onload = function() {
        var fullscreenBg = document.createElement('div');
        fullscreenBg.className = 'fullscreen-bg';
        document.body.appendChild(fullscreenBg);
    }
</script>
